name: Deploy to Firebase Hosting on merge
on:
    push:
        branches:
            - main
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            - run: npm run test:coverage

    build_and_deploy:
        needs: test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - run: npm ci
            - run: npm run build
              env:
                  VITE_REMOTE_HOST: ${{ secrets.VITE_REMOTE_HOST }}
                  VITE_ENCRIPTION_KEY: ${{ secrets.VITE_ENCRIPTION_KEY }}
                  VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}
                  VITE_STRIPE_ACTION_TYPE: ${{ vars.VITE_STRIPE_ACTION_TYPE }}

            - uses: google-github-actions/auth@v3
              with:
                  credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KARNAUKH_VUE_TEST }}

            - name: Deploy to Firebase Hosting
              run: npx firebase-tools@latest deploy --only hosting --project karnaukh-vue-test --non-interactive
